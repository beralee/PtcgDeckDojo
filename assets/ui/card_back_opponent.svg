<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1000">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b0714"/>
      <stop offset="45%" stop-color="#45133a"/>
      <stop offset="100%" stop-color="#0d0610"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#ffd4ee" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ff4c95" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff4c95" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8ecf"/>
      <stop offset="50%" stop-color="#ffda63"/>
      <stop offset="100%" stop-color="#9d7bff"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

